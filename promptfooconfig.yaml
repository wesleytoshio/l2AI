prompts:
  - "{{query}}"

providers:
  - id: "exec:npx tsx src/promptfooBridge.ts"

tests:
  - vars:
      query: "onde cai wind stone?"
    assertions:
      - type: icontains
        value: "Chieftain's Treasure Chest"
      - type: icontains
        value: "Wind Stone"

  - vars:
      query: "em que level eu pego a habilidade guts?"
    assertions:
      - type: icontains
        value: "level 43"
      - type: icontains
        value: "Titan"

  - vars:
      query: "onde spawna o npc 20191?"
    assertions:
      - type: icontains
        value: "19_23.xml"
      - type: icontains
        value: "Caiman" # Exemplo se 20191 for Caiman

  - vars:
      query: "como upar level 80?"
    assertions:
      - type: icontains
        value: "level"
      - type: icontains
        value: "80"

  - vars:
      query: "quais os stats da Draconic Bow?"
    assertions:
      - type: icontains
        value: "P.Atk"
      - type: icontains
        value: "S-grade"

  - vars:
      query: "o que o npc 32167 (Nika) vende?"
    assertions:
      - type: icontains
        value: "buylists"
      - type: icontains
        value: "Soulshot"

  - vars:
      query: "onde posso trocar Iason Heine's Bill?"
    assertions:
      - type: icontains
        value: "multisell"
      - type: icontains
        value: "Roman"
